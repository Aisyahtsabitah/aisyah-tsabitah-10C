<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulir Testimoni - Toko Buku Aisyah Tsabitah</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #ebebeb;
  color: #07040f;
  margin: 20px;
  line-height: 1.6;
}

/* NAVBAR */
nav {
  background-color: #537ca4;
  padding: 12px;
  text-align: center;
  border-radius: 5px;
  margin-bottom: 20px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #c6e4e9;
  transform: scale(1.1);
}

/* HEADER */
h2 {
  color: #537ca4;
  background-color: #c6e4e9;
  text-align: center;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 20px;
  animation: fadeDown 1s ease;
}

/* TESTIMONI BOX */
.testimoni-box {
  background-color: #d8e5e7;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  animation: fadeUp 1s ease;
}

#hapusSemua {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 16px;
  background-color: #6c63ff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

#hapusSemua:hover {
  background-color: #574fd6;
  transform: scale(1.05);
}

/* ANIMASI */
@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

footer {
  text-align: center;
  margin-top: 30px;
  font-size: 14px;
  color: #555;
}
</style>
</head>
<body>

<nav>
  <a href="index.html">Beranda</a>
  <a href="produk.html">Produk</a>
  <a href="bedah-buku.html">Bedah Buku</a>
  <a href="testimoni.html">Testimoni</a>
  <a href="tampil-testimoni.html">Testimoni Pembeli</a>
  <a href="kontak.html">Kontak</a>
  <a href="event.html">Event</a>
</nav>

<main class="formulir">
    <h2>Testimoni-testimoni pembeli :</h2>
    <div id="daftarTestimoni"></div>
    <button id="hapusSemua">Hapus Semua Testimoni</button>
</main>

<footer>
    <p>&copy; 2025 Toko Buku Aisyah Tsabitah</p>
</footer>

<script>
const container = document.getElementById('daftarTestimoni');
const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];

if (testimoniList.length === 0) {
    container.innerHTML = "<p style='text-align:center; font-style:italic;'>Belum ada testimoni.</p>";
} else {
    testimoniList.forEach((t,i) => {
        const el = document.createElement('div');
        el.className = 'testimoni-box';
        el.innerHTML = `
          <p><strong>Nama:</strong> ${t.nama}</p>
          <p><strong>Asal Sekolah/Instansi/Komunitas:</strong> ${t.asal}</p>
          <p><strong>Email:</strong> ${t.email}</p>
          <p><strong>Judul Buku yang dibeli:</strong> ${t.judul}</p>
          <p><strong>Rating Buku (1-5):</strong> ${t.rating}</p>
          <p><strong>Pesan:</strong> ${t.pesan}</p>`;
        container.appendChild(el);
    });
}

document.getElementById("hapusSemua").addEventListener("click", function() {
    const konfirmasi = confirm("Apakah Anda yakin ingin menghapus semua testimoni?");
    if (konfirmasi) {
        localStorage.removeItem("testimoniList");
        location.reload();
    }
});
</script>

</body>
</html>
