<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Usaha Buku</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background-color: #ebebeb;
  color: #07040f;
}

/* NAVBAR */
nav {
  background-color: #537ca4;
  padding: 12px;
  text-align: center;
  border-radius: 5px;
  margin-bottom: 20px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color: #c6e4e9;
  transform: scale(1.1);
}

/* HEADER */
h1 {
  text-align: center;
  margin: 20px 0;
  color: #537ca4;
  background-color: #c6e4e9;
  padding: 10px;
  border-radius: 5px;
  animation: fadeDown 1s ease;
}

/* FORMULIR TESTIMONI */
.formulir {
  max-width: 600px;
  margin: auto;
  padding: 20px;
  background-color: #d8e5e7;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  animation: fadeUp 1s ease;
}

.formulir h2 {
  color: #010c18;
  margin-bottom: 15px;
  text-align: center;
}

form label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

form input, form textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
  transition: 0.3s;
}

form input:focus, form textarea:focus {
  border-color: #537ca4;
  box-shadow: 0 0 5px rgba(83,124,164,0.5);
  outline: none;
}

form button {
  background-color: #3498db;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

form button:hover {
  background-color: #2980b9;
  transform: scale(1.05);
}

/* ANIMASI */
@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* FOOTER */
footer {
  text-align: center;
  background-color: #537ca4;
  color: white;
  padding: 10px;
  margin-top: 30px;
  border-radius: 5px;
}
</style>
</head>
<body>

<nav>
  <a href="index.html">Beranda</a>
  <a href="produk.html">Produk</a>
  <a href="bedah-buku.html">Bedah Buku</a>
  <a href="testimoni.html">Testimoni</a>
  <a href="tampil-testimoni.html">Testimoni Pembeli</a>
  <a href="kontak.html">Kontak</a>
  <a href="event.html">Event</a> 
</nav>

<h1>Toko Buku Aisyah Tsabitah</h1>

<main class="formulir">
    <h2>Berikan Testimoni Anda</h2>
    <form id="formTestimoni">
    <label for="nama">Nama:</label>
    <input type="text" id="nama" name="nama" required placeholder="Nama lengkap">

    <label for="asal">Asal Sekolah/Instansi/Komunitas:</label> 
    <input type="text" id="asal" name="asal" required placeholder="Contoh:SMA Al-Kautsar">

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="email@example.com">

    <label for="judul">Judul Buku yang dibeli:</label>
    <input type="text" id="judul" name="judul">

    <label for="rating">Rating Buku (1-5):</label>
    <input type="number" id="rating" name="rating" min="1" max="5">
    
    <label for="pesan">Testimoni Anda:</label>
    <textarea id="pesan" name="pesan" required placeholder="Tulis Pengalaman Anda..." rows="5"></textarea>
    
    <button type="submit">Kirim Testimoni</button>
    </form>
</main>

<footer>
    <p>&copy; 2025 Toko Buku Aisyah Tsabitah</p>
</footer>

<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();
        const nama = document.getElementById('nama').value;
        const asal = document.getElementById('asal').value;
        const email = document.getElementById('email').value;
        const judul = document.getElementById('judul').value;
        const rating = document.getElementById('rating').value;
        const pesan = document.getElementById('pesan').value;

        const dataBaru= { nama, asal, email, judul, rating, pesan };
        // Ambil list dari localStorage
        const testimoniList = JSON.parse(localStorage.getItem('testimoniList')) || [];
        // Tambahkan testimoni baru
        testimoniList.push(dataBaru);
        // Simpan kembali ke localStorage
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));
        // Arahkan ke halaman konfirmasi
        window.location.href = 'proses-testimoni.html';
    });
</script>

</body>
</html>
